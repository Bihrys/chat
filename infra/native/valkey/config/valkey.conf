# Generated at runtime from this template by scripts/infrastructure/valkey/start.sh.
bind 127.0.0.1
protected-mode yes
port @VALKEY_PORT@
daemonize yes
supervised no
pidfile @ROOT@/var/run/pids/valkey.pid
dir @ROOT@/var/data/valkey
dbfilename dump.rdb
appendonly yes
appendfilename "appendonly.aof"
loglevel notice
logfile "@ROOT@/var/logs/infrastructure/valkey/valkey.log"
databases 16

[package]
name = "chat-windows-desktop"
version = "0.1.0"
edition = "2024"
rust-version = "1.96.0"
publish = false

[build-dependencies]
tauri-build = "2"

[dependencies]
tauri = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chat-client-facade = { path = "../../../crates/client/facade" }
chat-platform-windows = { path = "../../../crates/platform/windows" }

[lib]
name = "chat_desktop"
path = "src/lib.rs"
